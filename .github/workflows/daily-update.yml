name: Daily Market Update

on:
  schedule:
    # 台灣時間 16:30（UTC 08:30），週一到週五
    - cron: '30 8 * * 1-5'
    # 台灣時間 09:30（UTC 01:30），開盤後跑一次盤中快照（選用）
    # - cron: '30 1 * * 1-5'
  workflow_dispatch:  # 允許手動觸發

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run post-market pipeline (Taiwan + US)
        run: python pipeline/run.py

      - name: Commit updated data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          git diff --staged --quiet || git commit -m "data: daily update $(TZ=Asia/Taipei date '+%Y-%m-%d %H:%M')"
          git push

  deploy-pages:
    needs: update-data
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main  # 取 update-data 剛 push 的版本

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
