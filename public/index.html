<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock Tide｜資金輪動圖</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
  :root {
    --bg: #0d1117; --panel: #161b22; --border: #30363d; --text: #e6edf3;
    --muted: #8b949e;
    --rising: #f85149; --rotating: #d29922; --watching: #58a6ff; --ebbing: #3fb950;
  }
  * { box-sizing: border-box; margin: 0; }
  body { background: var(--bg); color: var(--text); font-family: "Noto Sans TC", system-ui, sans-serif; }
  header { display: flex; align-items: center; gap: 16px; padding: 14px 20px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  h1 { font-size: 18px; }
  .tabs { display: flex; gap: 8px; }
  .tab { padding: 6px 16px; border: 1px solid var(--border); border-radius: 8px; background: var(--panel); color: var(--muted); cursor: pointer; font-size: 14px; }
  .tab.active { color: var(--text); border-color: #58a6ff; background: #1c2a3a; }
  .meta { margin-left: auto; color: var(--muted); font-size: 12px; }
  .legend { display: flex; gap: 14px; padding: 10px 20px; font-size: 13px; color: var(--muted); flex-wrap: wrap; }
  .legend span::before { content: "●"; margin-right: 4px; }
  .lg-rising::before { color: var(--rising); } .lg-rotating::before { color: var(--rotating); }
  .lg-watching::before { color: var(--watching); } .lg-ebbing::before { color: var(--ebbing); }
  #chart { width: 100%; height: calc(100vh - 110px); min-height: 480px; }
  /* 台股慣例：紅=漲潮(流入) 綠=退潮(流出) */
  .hint { color: var(--muted); font-size: 12px; padding: 0 20px 8px; }

  /* 自選股 */
  #watch { display: none; padding: 16px 20px; }
  .watch-bar { display: flex; gap: 8px; margin-bottom: 16px; position: relative; }
  .watch-bar input { background: var(--panel); border: 1px solid var(--border); color: var(--text);
    border-radius: 8px; padding: 8px 12px; font-size: 14px; width: 220px; }
  #suggest { position: absolute; top: 40px; left: 0; width: 246px; background: var(--panel);
    border: 1px solid var(--border); border-radius: 8px; z-index: 10; overflow: hidden; display: none; }
  #suggest div { padding: 8px 12px; font-size: 14px; cursor: pointer; }
  #suggest div:hover, #suggest div.sel { background: #1c2a3a; }
  #suggest small { color: var(--muted); margin-left: 8px; }
  .watch-bar button { background: #1c2a3a; border: 1px solid #58a6ff; color: var(--text);
    border-radius: 8px; padding: 8px 16px; cursor: pointer; }
  #cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 12px; }
  .card { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; position: relative; }
  .card .rm { position: absolute; top: 8px; right: 12px; color: var(--muted); cursor: pointer; background: none; border: none; font-size: 16px; }
  .card h3 { font-size: 15px; margin-bottom: 6px; }
  .card h3 small { color: var(--muted); font-weight: normal; margin-left: 6px; }
  .price { font-size: 26px; font-weight: 700; }
  .price small { font-size: 14px; margin-left: 8px; }
  .up { color: var(--rising); } .down { color: var(--ebbing); } .flat { color: var(--text); }
  .ohlc { display: flex; gap: 14px; color: var(--muted); font-size: 12px; margin: 8px 0 4px; flex-wrap: wrap; }
  .ohlc b { color: var(--text); font-weight: normal; }
</style>
</head>
<body>
<header>
  <h1>🌊 Stock Tide</h1>
  <div class="tabs">
    <button class="tab active" data-market="tw">台股</button>
    <button class="tab" data-market="index">大盤指數</button>
    <button class="tab" data-market="us">美股</button>
    <button class="tab" data-market="watch">自選股</button>
  </div>
  <div class="meta" id="meta"></div>
</header>
<div class="legend" id="legend">
  <span class="lg-rising">漲潮（加速流入）</span>
  <span class="lg-rotating">輪動（流入放緩）</span>
  <span class="lg-watching">觀望（流出趨緩）</span>
  <span class="lg-ebbing">退潮（持續流出）</span>
</div>
<div class="hint" id="hint" style="display:none">滾輪縮放、拖曳平移</div>
<div id="chart"></div>
<div id="watch">
  <div class="watch-bar">
    <input id="watch-input" placeholder="代號或名稱，如 2330 / 台積電" autocomplete="off">
    <button id="watch-add">加入</button>
    <div id="suggest"></div>
  </div>
  <div id="cards"></div>
</div>

<script>
const COLORS = { rising: "#f85149", rotating: "#d29922", watching: "#58a6ff", ebbing: "#3fb950" };
const PHASE_TXT = { rising: "漲潮", rotating: "輪動", watching: "觀望", ebbing: "退潮" };
const chart = echarts.init(document.getElementById("chart"), null, { renderer: "canvas" });
let cache = {};

// 對稱對數刻度：量體差距大（半導體千億 vs 小板塊個位數億）時仍可分布開來
const slog = v => Math.sign(v) * Math.log10(1 + Math.abs(v));
const unslog = v => Math.sign(v) * (Math.pow(10, Math.abs(v)) - 1);
const fmtLog = v => {
  const raw = unslog(v);
  return Math.abs(raw) >= 100 ? Math.round(raw) : +raw.toFixed(1);
};

let refreshTimer = null;

async function fetchJSON(name) {
  try {
    const res = await fetch(`data/${name}.json?t=${Date.now()}`);
    return res.ok ? await res.json() : null;
  } catch { return null; }
}

const isFresh = d => d?.generatedAt &&
  (Date.now() - new Date(d.generatedAt).getTime()) < 10 * 60 * 1000;

function showView(market) {
  const rotation = market === "tw" || market === "us";
  document.getElementById("legend").style.display = rotation ? "flex" : "none";
  document.getElementById("hint").style.display = market === "watch" ? "none" : "block";
  document.getElementById("chart").style.display = market === "watch" ? "none" : "block";
  document.getElementById("watch").style.display = market === "watch" ? "block" : "none";
  if (market !== "watch") chart.resize();
}

async function load(market) {
  clearInterval(refreshTimer);
  refreshTimer = null;
  showView(market);

  if (market === "index") {
    const d = await fetchJSON("tw_index");
    if (!d) { document.getElementById("meta").textContent = "尚無大盤資料（請先啟動盤中 runner）"; return; }
    renderIndex(d);
    refreshTimer = setInterval(async () => {
      const x = await fetchJSON("tw_index");
      if (x) renderIndex(x);
    }, 60 * 1000);
    return;
  }
  if (market === "watch") {
    await renderWatch();
    refreshTimer = setInterval(renderWatch, 60 * 1000);
    return;
  }
  if (market === "tw") {
    // 盤中價量版 10 分鐘內有更新 → 即時模式；否則回盤後法人版
    const intraday = await fetchJSON("tw_intraday");
    if (isFresh(intraday)) {
      render(intraday);
      refreshTimer = setInterval(async () => {
        const d = await fetchJSON("tw_intraday");
        if (isFresh(d)) render(d); else load("tw");
      }, 60 * 1000);
      return;
    }
  }
  if (!cache[market]) cache[market] = await fetchJSON(market);
  render(cache[market]);
}

function render(d) {
  const live = d.mode === "intraday"
    ? `｜大盤 ${d.marketChg > 0 ? "+" : ""}${d.marketChg}%　🔴 即時` : "";
  document.getElementById("meta").textContent =
    `${d.title}｜${d.dataDate}${live}`;

  const isRRG = d.mode === "rrg";
  const cx = isRRG ? 100 : 0, cy = isRRG ? 100 : 0;
  const tx = d.mode === "flow" ? slog : (v => v);  // 法人金額跨度大才需要對數刻度
  const sizes = d.sectors.map(s => s.size);
  const maxSize = Math.max(...sizes, 1);

  const series = [{
    type: "scatter",
    labelLayout: { hideOverlap: true },
    data: d.sectors.map(s => ({
      name: s.name, value: [tx(s.x), tx(s.y)], raw: s,
      symbolSize: 14 + 46 * Math.sqrt(s.size / maxSize),
      itemStyle: { color: COLORS[s.phase], opacity: 0.82,
                   borderColor: "#fff", borderWidth: 0.5 },
      label: { show: true, position: "top", color: "#e6edf3",
               fontSize: 11, formatter: s.name },
    })),
  }];

  chart.setOption({
    backgroundColor: "transparent",
    grid: { left: 60, right: 30, top: 40, bottom: 50 },
    dataZoom: [
      { type: "inside", xAxisIndex: 0, filterMode: "none" },
      { type: "inside", yAxisIndex: 0, filterMode: "none" },
    ],
    xAxis: {
      name: d.axisX + (d.unit ? `（${d.unit}）` : ""), nameLocation: "middle", nameGap: 28,
      type: "value", scale: true,
      axisLine: { lineStyle: { color: "#484f58" } },
      splitLine: { lineStyle: { color: "#21262d" } },
      axisLabel: { color: "#8b949e", formatter: d.mode === "flow" ? fmtLog : undefined },
      nameTextStyle: { color: "#8b949e" },
    },
    yAxis: {
      name: d.axisY, nameGap: 42, nameLocation: "middle",
      type: "value", scale: true,
      axisLine: { lineStyle: { color: "#484f58" } },
      splitLine: { lineStyle: { color: "#21262d" } },
      axisLabel: { color: "#8b949e", formatter: d.mode === "flow" ? fmtLog : undefined },
      nameTextStyle: { color: "#8b949e" },
    },
    tooltip: {
      backgroundColor: "#161b22", borderColor: "#30363d",
      textStyle: { color: "#e6edf3", fontSize: 12 },
      formatter: p => {
        const s = p.data.raw;
        if (!s) return "";
        let html = `<b>${s.name}</b>　<span style="color:${COLORS[s.phase]}">${PHASE_TXT[s.phase]}</span><br>`;
        if (d.mode === "intraday") {
          html += `板塊漲跌：${s.chg > 0 ? "+" : ""}${s.chg}%（相對大盤 ${s.x > 0 ? "+" : ""}${s.x}%）<br>` +
                  `資金動能：${s.y > 0 ? "+" : ""}${s.y} 百分點<br>` +
                  `成交金額：${s.amount} 億（占比 ${s.size}%）`;
          if (s.topStocks?.length) html += `<br><br><b>成交額前五</b><br>` +
            s.topStocks.map(t =>
              `${t.code} ${t.name}　${t.chg > 0 ? "+" : ""}${t.chg}%　${t.amount}億`).join("<br>");
        } else if (d.mode === "flow") {
          html += `近5日買賣超：${s.x} 億<br>加速度：${s.y} 億<br>近20日累計：${s.flow20} 億`;
          if (s.topBuy?.length) html += `<br><br><b>法人買超</b><br>` +
            s.topBuy.map(t => `${t.code} ${t.name}　+${t.amount}億`).join("<br>");
          if (s.topSell?.length) html += `<br><b>法人賣超</b><br>` +
            s.topSell.map(t => `${t.code} ${t.name}　${t.amount}億`).join("<br>");
        } else {
          html += `RS-Ratio：${s.x}<br>RS-Momentum：${s.y}<br>近20日報酬：${s.ret20}%`;
        }
        return html;
      },
    },
    // 象限分隔線
    graphic: [],
    series: series.concat([{
      type: "line", markLine: {
        silent: true, symbol: "none",
        lineStyle: { color: "#6e7681", type: "dashed", width: 1 },
        label: { show: false },
        data: [{ xAxis: cx }, { yAxis: cy }],
      }, data: [],
    }]),
  }, true);
}

// ---------- 大盤指數 ----------
function renderIndex(d) {
  const up = d.chg >= 0;
  const color = up ? "#f85149" : "#3fb950";
  const live = isFresh(d) ? "　🔴 即時" : "";
  document.getElementById("meta").textContent =
    `${d.title}｜${d.dataDate}｜${d.last.toLocaleString()}（${up ? "+" : ""}${d.chg}%）${live}`;

  chart.setOption({
    backgroundColor: "transparent",
    grid: { left: 70, right: 30, top: 30, bottom: 50 },
    dataZoom: [{ type: "inside", xAxisIndex: 0 }],
    xAxis: {
      type: "category", data: d.points.map(p => p[0]),
      axisLine: { lineStyle: { color: "#484f58" } },
      axisLabel: { color: "#8b949e" }, name: "", splitLine: { show: false },
    },
    yAxis: (() => {
      const vals = d.points.map(p => p[1]).concat(d.prevClose);
      const lo = Math.min(...vals), hi = Math.max(...vals);
      const pad = Math.max((hi - lo) * 0.15, hi * 0.001);
      return {
        type: "value", name: "",
        min: Math.floor(lo - pad), max: Math.ceil(hi + pad),
        axisLine: { lineStyle: { color: "#484f58" } },
        splitLine: { lineStyle: { color: "#21262d" } },
        axisLabel: { color: "#8b949e", formatter: v => v.toLocaleString() },
      };
    })(),
    tooltip: {
      trigger: "axis",
      backgroundColor: "#161b22", borderColor: "#30363d",
      textStyle: { color: "#e6edf3", fontSize: 12 },
      formatter: ps => {
        const v = ps[0].value;
        const chg = (v / d.prevClose - 1) * 100;
        return `${ps[0].name}<br>${v.toLocaleString()}（${chg >= 0 ? "+" : ""}${chg.toFixed(2)}%）`;
      },
    },
    series: [{
      type: "line", data: d.points.map(p => p[1]),
      symbol: "none", lineStyle: { color, width: 1.5 },
      areaStyle: { color, opacity: 0.12 },
      markLine: {
        silent: true, symbol: "none",
        lineStyle: { color: "#6e7681", type: "dashed" },
        label: { color: "#8b949e", formatter: "昨收 {c}" },
        data: [{ yAxis: d.prevClose }],
      },
    }],
  }, true);
}

// ---------- 自選股 ----------
const WL_KEY = "tide_watchlist";
const getWL = () => JSON.parse(localStorage.getItem(WL_KEY) || '["2330"]');
const setWL = wl => localStorage.setItem(WL_KEY, JSON.stringify(wl));

function sparkSVG(spark, prev, color) {
  if (!spark || spark.length < 2) return "";
  const w = 280, h = 56;
  const lo = Math.min(...spark, prev), hi = Math.max(...spark, prev);
  const span = (hi - lo) || 1;
  const px = i => (i / (spark.length - 1)) * w;
  const py = v => h - ((v - lo) / span) * (h - 6) - 3;
  const pts = spark.map((v, i) => `${px(i).toFixed(1)},${py(v).toFixed(1)}`).join(" ");
  const base = py(prev).toFixed(1);
  return `<svg width="100%" height="${h}" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <line x1="0" y1="${base}" x2="${w}" y2="${base}" stroke="#6e7681" stroke-dasharray="4 3" stroke-width="1"/>
    <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.5"/></svg>`;
}

let stocksCache = null;  // 最新全市場報價，也是代號↔名稱對照表

async function renderWatch() {
  let data = await fetchJSON("tw_stocks");
  if (data) stocksCache = data; else data = stocksCache;
  const cards = document.getElementById("cards");
  if (!data) {
    document.getElementById("meta").textContent = "尚無個股資料（請先啟動盤中 runner）";
    cards.innerHTML = "";
    return;
  }
  const live = isFresh(data) ? "　🔴 即時" : "（已收盤/資料非即時）";
  document.getElementById("meta").textContent = `自選股監控｜${data.dataDate}${live}`;

  cards.innerHTML = getWL().map(code => {
    const s = data.stocks[code];
    if (!s) return `<div class="card"><button class="rm" data-code="${code}">✕</button>
      <h3>${code}</h3><div class="ohlc">查無資料（僅支援上市普通股）</div></div>`;
    const cls = s.chg > 0 ? "up" : s.chg < 0 ? "down" : "flat";
    const sign = s.chg > 0 ? "+" : "";
    const color = s.chg > 0 ? "#f85149" : s.chg < 0 ? "#3fb950" : "#8b949e";
    return `<div class="card">
      <button class="rm" data-code="${code}">✕</button>
      <h3>${s.n}<small>${code}</small></h3>
      <div class="price ${cls}">${s.z}<small>${sign}${s.chg}%</small></div>
      <div class="ohlc">
        <span>開 <b>${s.o ?? "-"}</b></span><span>高 <b>${s.h ?? "-"}</b></span>
        <span>低 <b>${s.l ?? "-"}</b></span><span>昨收 <b>${s.y}</b></span>
      </div>
      <div class="ohlc">
        <span>成交量 <b>${s.v.toLocaleString()} 張</b></span>
        <span>金額 <b>${s.a} 億</b></span>
      </div>
      ${sparkSVG(s.spark, s.y, color)}</div>`;
  }).join("");

  cards.querySelectorAll(".rm").forEach(b => b.addEventListener("click", () => {
    setWL(getWL().filter(c => c !== b.dataset.code));
    renderWatch();
  }));
}

// 代號或名稱 → [code, name] 候選清單（代號前綴或名稱包含）
function matchStocks(q) {
  if (!q || !stocksCache) return [];
  const out = [];
  for (const [code, s] of Object.entries(stocksCache.stocks)) {
    if (code.startsWith(q) || s.n.includes(q)) {
      out.push([code, s.n]);
      if (out.length >= 8) break;
    }
  }
  return out;
}

function addCode(code) {
  const wl = getWL();
  if (!wl.includes(code)) { wl.push(code); setWL(wl); }
  const input = document.getElementById("watch-input");
  input.value = "";
  hideSuggest();
  renderWatch();
}

function addWatch() {
  const q = document.getElementById("watch-input").value.trim();
  if (!q) return;
  // 純 4 碼代號直接收；其餘用名稱/前綴解析，取第一個候選
  if (/^\d{4}$/.test(q)) return addCode(q);
  const m = matchStocks(q);
  const exact = m.find(([, n]) => n === q);
  if (exact || m.length) addCode((exact || m[0])[0]);
}

const suggestEl = document.getElementById("suggest");
function hideSuggest() { suggestEl.style.display = "none"; }

function showSuggest() {
  const q = document.getElementById("watch-input").value.trim();
  const m = matchStocks(q);
  if (!m.length) return hideSuggest();
  suggestEl.innerHTML = m.map(([code, n]) =>
    `<div data-code="${code}">${n}<small>${code}</small></div>`).join("");
  suggestEl.style.display = "block";
  suggestEl.querySelectorAll("div").forEach(el =>
    el.addEventListener("mousedown", e => { e.preventDefault(); addCode(el.dataset.code); }));
}

document.getElementById("watch-add").addEventListener("click", addWatch);
document.getElementById("watch-input").addEventListener("input", showSuggest);
document.getElementById("watch-input").addEventListener("blur", () => setTimeout(hideSuggest, 150));
document.getElementById("watch-input").addEventListener("keydown", e => {
  if (e.key === "Enter") addWatch();
  if (e.key === "Escape") hideSuggest();
});

document.querySelectorAll(".tab").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    load(btn.dataset.market);
  });
});
window.addEventListener("resize", () => chart.resize());
load("tw");
</script>
</body>
</html>
