<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock TideпҪңиіҮйҮ‘ијӘеӢ•ең–</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
  :root {
    --bg: #0d1117; --panel: #161b22; --border: #30363d; --text: #e6edf3;
    --muted: #8b949e;
    --rising: #f85149; --rotating: #d29922; --watching: #58a6ff; --ebbing: #3fb950;
  }
  * { box-sizing: border-box; margin: 0; }
  body { background: var(--bg); color: var(--text); font-family: "Noto Sans TC", system-ui, sans-serif; }
  header { display: flex; align-items: center; gap: 16px; padding: 14px 20px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  h1 { font-size: 18px; }
  .tabs { display: flex; gap: 8px; }
  .tab { padding: 6px 16px; border: 1px solid var(--border); border-radius: 8px; background: var(--panel); color: var(--muted); cursor: pointer; font-size: 14px; }
  .tab.active { color: var(--text); border-color: #58a6ff; background: #1c2a3a; }
  .meta { margin-left: auto; color: var(--muted); font-size: 12px; }
  .legend { display: flex; gap: 14px; padding: 10px 20px; font-size: 13px; color: var(--muted); flex-wrap: wrap; }
  .legend span::before { content: "в—Ҹ"; margin-right: 4px; }
  .lg-rising::before { color: var(--rising); } .lg-rotating::before { color: var(--rotating); }
  .lg-watching::before { color: var(--watching); } .lg-ebbing::before { color: var(--ebbing); }
  #chart { width: 100%; height: calc(100vh - 110px); min-height: 480px; }
  /* еҸ°иӮЎж…ЈдҫӢпјҡзҙ…=жјІжҪ®(жөҒе…Ҙ) з¶ =йҖҖжҪ®(жөҒеҮә) */
  .hint { color: var(--muted); font-size: 12px; padding: 0 20px 8px; }

  /* иҮӘйҒёиӮЎ */
  #watch { display: none; padding: 16px 20px; }
  .watch-bar { display: flex; gap: 8px; margin-bottom: 16px; position: relative; }
  .watch-bar input { background: var(--panel); border: 1px solid var(--border); color: var(--text);
    border-radius: 8px; padding: 8px 12px; font-size: 14px; width: 220px; }
  #suggest { position: absolute; top: 40px; left: 0; width: 246px; background: var(--panel);
    border: 1px solid var(--border); border-radius: 8px; z-index: 10; overflow: hidden; display: none; }
  #suggest div { padding: 8px 12px; font-size: 14px; cursor: pointer; }
  #suggest div:hover, #suggest div.sel { background: #1c2a3a; }
  #suggest small { color: var(--muted); margin-left: 8px; }
  .watch-bar button { background: #1c2a3a; border: 1px solid #58a6ff; color: var(--text);
    border-radius: 8px; padding: 8px 16px; cursor: pointer; }
  #cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 12px; }
  .card { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; position: relative; }
  .card .rm { position: absolute; top: 8px; right: 12px; color: var(--muted); cursor: pointer; background: none; border: none; font-size: 16px; }
  .card h3 { font-size: 15px; margin-bottom: 6px; }
  .card h3 small { color: var(--muted); font-weight: normal; margin-left: 6px; }
  .price { font-size: 26px; font-weight: 700; }
  .price small { font-size: 14px; margin-left: 8px; }
  .up { color: var(--rising); } .down { color: var(--ebbing); } .flat { color: var(--text); }
  .ohlc { display: flex; gap: 14px; color: var(--muted); font-size: 12px; margin: 8px 0 4px; flex-wrap: wrap; }
  .ohlc b { color: var(--text); font-weight: normal; }
  .card { cursor: pointer; }

  /* жҢҮж•ёеҚЎзүҮеҲ— */
  #idx-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; margin-bottom: 16px; }
  .idx-card { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 12px 16px; }
  .idx-card h4 { font-size: 13px; color: var(--muted); margin-bottom: 4px; font-weight: normal; }
  .idx-card .val { font-size: 22px; font-weight: 700; }
  .idx-card .val small { font-size: 13px; margin-left: 8px; }

  /* еҖӢиӮЎи©ізҙ°й Ғ */
  #detail { display: none; position: fixed; inset: 0; background: rgba(1,4,9,.72); z-index: 100; overflow: auto; }
  .detail-box { max-width: 880px; margin: 24px auto; background: var(--panel); border: 1px solid var(--border);
    border-radius: 14px; padding: 18px 22px; }
  .detail-head { display: flex; align-items: baseline; gap: 14px; margin-bottom: 10px; }
  .detail-head .close { margin-left: auto; background: none; border: none; color: var(--muted); font-size: 20px; cursor: pointer; }
  #detail-chart { width: 100%; height: 300px; }
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; margin-top: 8px; }
  @media (max-width: 720px) { .detail-grid { grid-template-columns: 1fr; } }
  .kv { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 18px; font-size: 13px; align-content: start; }
  .kv span { color: var(--muted); } .kv b { font-weight: normal; }
  .ob { font-size: 13px; }
  .ob h4, .ticks h4 { font-size: 13px; color: var(--muted); margin-bottom: 6px; font-weight: normal; }
  .ob table { width: 100%; border-collapse: collapse; }
  .ob td { padding: 3px 6px; position: relative; }
  .ob .bar { position: absolute; top: 2px; bottom: 2px; opacity: 0.22; border-radius: 2px; }
  .ticks { margin-top: 14px; }
  .ticks table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .ticks td, .ticks th { padding: 3px 8px; text-align: right; border-bottom: 1px solid #21262d; }
  .ticks th { color: var(--muted); font-weight: normal; }
  .ticks td:first-child, .ticks th:first-child { text-align: left; color: var(--muted); }
</style>
</head>
<body>
<header>
  <h1>рҹҢҠ Stock Tide</h1>
  <div class="tabs">
    <button class="tab active" data-market="tw">еҸ°иӮЎ</button>
    <button class="tab" data-market="index">еӨ§зӣӨжҢҮж•ё</button>
    <button class="tab" data-market="us">зҫҺиӮЎ</button>
    <button class="tab" data-market="watch">иҮӘйҒёиӮЎ</button>
  </div>
  <div class="meta" id="meta"></div>
</header>
<div class="legend" id="legend">
  <span class="lg-rising">жјІжҪ®пјҲеҠ йҖҹжөҒе…Ҙпјү</span>
  <span class="lg-rotating">ијӘеӢ•пјҲжөҒе…Ҙж”ҫз·©пјү</span>
  <span class="lg-watching">и§ҖжңӣпјҲжөҒеҮәи¶Ёз·©пјү</span>
  <span class="lg-ebbing">йҖҖжҪ®пјҲжҢҒзәҢжөҒеҮәпјү</span>
</div>
<div class="hint" id="hint" style="display:none">ж»ҫијӘзё®ж”ҫгҖҒжӢ–жӣіе№із§»</div>
<div id="chart"></div>
<div id="watch">
  <div id="idx-cards"></div>
  <div class="watch-bar">
    <input id="watch-input" placeholder="д»ЈиҷҹжҲ–еҗҚзЁұпјҢеҰӮ 2330 / еҸ°з©Қйӣ»" autocomplete="off">
    <button id="watch-add">еҠ е…Ҙ</button>
    <div id="suggest"></div>
  </div>
  <div id="cards"></div>
</div>
<div id="detail">
  <div class="detail-box">
    <div class="detail-head">
      <h3 id="dt-name" style="font-size:18px"></h3>
      <span id="dt-price" class="price"></span>
      <button class="close" id="dt-close">вң•</button>
    </div>
    <div id="detail-chart"></div>
    <div class="detail-grid">
      <div class="kv" id="dt-info"></div>
      <div class="ob"><h4>дә”жӘ”е§”иІ·е§”иіЈ</h4><table id="dt-ob"></table></div>
    </div>
    <div class="ticks"><h4>еҲҶжҷӮжҳҺзҙ°пјҲжҜҸеҲҶйҗҳеҸ–жЁЈпјү</h4><table id="dt-ticks"></table></div>
  </div>
</div>

<script>
const COLORS = { rising: "#f85149", rotating: "#d29922", watching: "#58a6ff", ebbing: "#3fb950" };
const PHASE_TXT = { rising: "жјІжҪ®", rotating: "ијӘеӢ•", watching: "и§Җжңӣ", ebbing: "йҖҖжҪ®" };
const chart = echarts.init(document.getElementById("chart"), null, { renderer: "canvas" });
let cache = {};

// е°ҚзЁұе°Қж•ёеҲ»еәҰпјҡйҮҸй«”е·®и·қеӨ§пјҲеҚҠе°Һй«”еҚғе„„ vs е°ҸжқҝеЎҠеҖӢдҪҚж•ёе„„пјүжҷӮд»ҚеҸҜеҲҶеёғй–ӢдҫҶ
const slog = v => Math.sign(v) * Math.log10(1 + Math.abs(v));
const unslog = v => Math.sign(v) * (Math.pow(10, Math.abs(v)) - 1);
const fmtLog = v => {
  const raw = unslog(v);
  return Math.abs(raw) >= 100 ? Math.round(raw) : +raw.toFixed(1);
};

let refreshTimer = null;

async function fetchJSON(name) {
  try {
    const res = await fetch(`data/${name}.json?t=${Date.now()}`);
    return res.ok ? await res.json() : null;
  } catch { return null; }
}

const isFresh = d => d?.generatedAt &&
  (Date.now() - new Date(d.generatedAt).getTime()) < 10 * 60 * 1000;

function showView(market) {
  const rotation = market === "tw" || market === "us";
  document.getElementById("legend").style.display = rotation ? "flex" : "none";
  document.getElementById("hint").style.display = market === "watch" ? "none" : "block";
  document.getElementById("chart").style.display = market === "watch" ? "none" : "block";
  document.getElementById("watch").style.display = market === "watch" ? "block" : "none";
  if (market !== "watch") chart.resize();
}

async function load(market) {
  clearInterval(refreshTimer);
  refreshTimer = null;
  showView(market);

  if (market === "index") {
    const d = await fetchJSON("tw_index");
    if (!d) { document.getElementById("meta").textContent = "е°ҡз„ЎеӨ§зӣӨиіҮж–ҷпјҲи«Ӣе…Ҳе•ҹеӢ•зӣӨдёӯ runnerпјү"; return; }
    renderIndex(d);
    refreshTimer = setInterval(async () => {
      const x = await fetchJSON("tw_index");
      if (x) renderIndex(x);
    }, 60 * 1000);
    return;
  }
  if (market === "watch") {
    await renderWatch();
    refreshTimer = setInterval(renderWatch, 60 * 1000);
    return;
  }
  if (market === "tw") {
    // зӣӨдёӯеғ№йҮҸзүҲ 10 еҲҶйҗҳе…§жңүжӣҙж–° вҶ’ еҚіжҷӮжЁЎејҸпјӣеҗҰеүҮеӣһзӣӨеҫҢжі•дәәзүҲ
    const intraday = await fetchJSON("tw_intraday");
    if (isFresh(intraday)) {
      render(intraday);
      refreshTimer = setInterval(async () => {
        const d = await fetchJSON("tw_intraday");
        if (isFresh(d)) render(d); else load("tw");
      }, 60 * 1000);
      return;
    }
  }
  if (!cache[market]) cache[market] = await fetchJSON(market);
  render(cache[market]);
}

function render(d) {
  const live = d.mode === "intraday"
    ? `пҪңеӨ§зӣӨ ${d.marketChg > 0 ? "+" : ""}${d.marketChg}%гҖҖрҹ”ҙ еҚіжҷӮ` : "";
  document.getElementById("meta").textContent =
    `${d.title}пҪң${d.dataDate}${live}`;

  const isRRG = d.mode === "rrg";
  const cx = isRRG ? 100 : 0, cy = isRRG ? 100 : 0;
  const tx = d.mode === "flow" ? slog : (v => v);  // жі•дәәйҮ‘йЎҚи·ЁеәҰеӨ§жүҚйңҖиҰҒе°Қж•ёеҲ»еәҰ
  const sizes = d.sectors.map(s => s.size);
  const maxSize = Math.max(...sizes, 1);

  const series = [{
    type: "scatter",
    labelLayout: { hideOverlap: true },
    data: d.sectors.map(s => ({
      name: s.name, value: [tx(s.x), tx(s.y)], raw: s,
      symbolSize: 14 + 46 * Math.sqrt(s.size / maxSize),
      itemStyle: { color: COLORS[s.phase], opacity: 0.82,
                   borderColor: "#fff", borderWidth: 0.5 },
      label: { show: true, position: "top", color: "#e6edf3",
               fontSize: 11, formatter: s.name },
    })),
  }];

  chart.setOption({
    backgroundColor: "transparent",
    grid: { left: 60, right: 30, top: 40, bottom: 50 },
    dataZoom: [
      { type: "inside", xAxisIndex: 0, filterMode: "none" },
      { type: "inside", yAxisIndex: 0, filterMode: "none" },
    ],
    xAxis: {
      name: d.axisX + (d.unit ? `пјҲ${d.unit}пјү` : ""), nameLocation: "middle", nameGap: 28,
      type: "value", scale: true,
      axisLine: { lineStyle: { color: "#484f58" } },
      splitLine: { lineStyle: { color: "#21262d" } },
      axisLabel: { color: "#8b949e", formatter: d.mode === "flow" ? fmtLog : undefined },
      nameTextStyle: { color: "#8b949e" },
    },
    yAxis: {
      name: d.axisY, nameGap: 42, nameLocation: "middle",
      type: "value", scale: true,
      axisLine: { lineStyle: { color: "#484f58" } },
      splitLine: { lineStyle: { color: "#21262d" } },
      axisLabel: { color: "#8b949e", formatter: d.mode === "flow" ? fmtLog : undefined },
      nameTextStyle: { color: "#8b949e" },
    },
    tooltip: {
      backgroundColor: "#161b22", borderColor: "#30363d",
      textStyle: { color: "#e6edf3", fontSize: 12 },
      formatter: p => {
        const s = p.data.raw;
        if (!s) return "";
        let html = `<b>${s.name}</b>гҖҖ<span style="color:${COLORS[s.phase]}">${PHASE_TXT[s.phase]}</span><br>`;
        if (d.mode === "intraday") {
          html += `жқҝеЎҠжјІи·Ңпјҡ${s.chg > 0 ? "+" : ""}${s.chg}%пјҲзӣёе°ҚеӨ§зӣӨ ${s.x > 0 ? "+" : ""}${s.x}%пјү<br>` +
                  `иіҮйҮ‘еӢ•иғҪпјҡ${s.y > 0 ? "+" : ""}${s.y} зҷҫеҲҶй»һ<br>` +
                  `жҲҗдәӨйҮ‘йЎҚпјҡ${s.amount} е„„пјҲеҚ жҜ” ${s.size}%пјү`;
          if (s.topStocks?.length) html += `<br><br><b>жҲҗдәӨйЎҚеүҚдә”</b><br>` +
            s.topStocks.map(t =>
              `${t.code} ${t.name}гҖҖ${t.chg > 0 ? "+" : ""}${t.chg}%гҖҖ${t.amount}е„„`).join("<br>");
        } else if (d.mode === "flow") {
          html += `иҝ‘5ж—ҘиІ·иіЈи¶…пјҡ${s.x} е„„<br>еҠ йҖҹеәҰпјҡ${s.y} е„„<br>иҝ‘20ж—ҘзҙҜиЁҲпјҡ${s.flow20} е„„`;
          if (s.topBuy?.length) html += `<br><br><b>жі•дәәиІ·и¶…</b><br>` +
            s.topBuy.map(t => `${t.code} ${t.name}гҖҖ+${t.amount}е„„`).join("<br>");
          if (s.topSell?.length) html += `<br><b>жі•дәәиіЈи¶…</b><br>` +
            s.topSell.map(t => `${t.code} ${t.name}гҖҖ${t.amount}е„„`).join("<br>");
        } else {
          html += `RS-Ratioпјҡ${s.x}<br>RS-Momentumпјҡ${s.y}<br>иҝ‘20ж—Ҙе ұй…¬пјҡ${s.ret20}%`;
        }
        return html;
      },
    },
    // иұЎйҷҗеҲҶйҡ”з·ҡ
    graphic: [],
    series: series.concat([{
      type: "line", markLine: {
        silent: true, symbol: "none",
        lineStyle: { color: "#6e7681", type: "dashed", width: 1 },
        label: { show: false },
        data: [{ xAxis: cx }, { yAxis: cy }],
      }, data: [],
    }]),
  }, true);
}

// ---------- еӨ§зӣӨжҢҮж•ё ----------
function renderIndex(d) {
  const up = d.chg >= 0;
  const color = up ? "#f85149" : "#3fb950";
  const live = isFresh(d) ? "гҖҖрҹ”ҙ еҚіжҷӮ" : "";
  document.getElementById("meta").textContent =
    `${d.title}пҪң${d.dataDate}пҪң${d.last.toLocaleString()}пјҲ${up ? "+" : ""}${d.chg}%пјү${live}`;

  chart.setOption({
    backgroundColor: "transparent",
    grid: { left: 70, right: 30, top: 30, bottom: 50 },
    dataZoom: [{ type: "inside", xAxisIndex: 0 }],
    xAxis: {
      type: "category", data: d.points.map(p => p[0]),
      axisLine: { lineStyle: { color: "#484f58" } },
      axisLabel: { color: "#8b949e" }, name: "", splitLine: { show: false },
    },
    yAxis: (() => {
      const vals = d.points.map(p => p[1]).concat(d.prevClose);
      const lo = Math.min(...vals), hi = Math.max(...vals);
      const pad = Math.max((hi - lo) * 0.15, hi * 0.001);
      return {
        type: "value", name: "",
        min: Math.floor(lo - pad), max: Math.ceil(hi + pad),
        axisLine: { lineStyle: { color: "#484f58" } },
        splitLine: { lineStyle: { color: "#21262d" } },
        axisLabel: { color: "#8b949e", formatter: v => v.toLocaleString() },
      };
    })(),
    tooltip: {
      trigger: "axis",
      backgroundColor: "#161b22", borderColor: "#30363d",
      textStyle: { color: "#e6edf3", fontSize: 12 },
      formatter: ps => {
        const v = ps[0].value;
        const chg = (v / d.prevClose - 1) * 100;
        return `${ps[0].name}<br>${v.toLocaleString()}пјҲ${chg >= 0 ? "+" : ""}${chg.toFixed(2)}%пјү`;
      },
    },
    series: [{
      type: "line", data: d.points.map(p => p[1]),
      symbol: "none", lineStyle: { color, width: 1.5 },
      areaStyle: { color, opacity: 0.12 },
      markLine: {
        silent: true, symbol: "none",
        lineStyle: { color: "#6e7681", type: "dashed" },
        label: { color: "#8b949e", formatter: "жҳЁж”¶ {c}" },
        data: [{ yAxis: d.prevClose }],
      },
    }],
  }, true);
}

// ---------- иҮӘйҒёиӮЎ ----------
const WL_KEY = "tide_watchlist";
const getWL = () => JSON.parse(localStorage.getItem(WL_KEY) || '["2330"]');
const setWL = wl => localStorage.setItem(WL_KEY, JSON.stringify(wl));

function sparkSVG(spark, prev, color) {
  if (!spark || spark.length < 2) return "";
  const w = 280, h = 56;
  const lo = Math.min(...spark, prev), hi = Math.max(...spark, prev);
  const span = (hi - lo) || 1;
  const px = i => (i / (spark.length - 1)) * w;
  const py = v => h - ((v - lo) / span) * (h - 6) - 3;
  const pts = spark.map((v, i) => `${px(i).toFixed(1)},${py(v).toFixed(1)}`).join(" ");
  const base = py(prev).toFixed(1);
  return `<svg width="100%" height="${h}" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <line x1="0" y1="${base}" x2="${w}" y2="${base}" stroke="#6e7681" stroke-dasharray="4 3" stroke-width="1"/>
    <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.5"/></svg>`;
}

let stocksCache = null;  // жңҖж–°е…ЁеёӮе ҙе ұеғ№пјҢд№ҹжҳҜд»ЈиҷҹвҶ”еҗҚзЁұе°Қз…§иЎЁ

function idxCard(title, q) {
  if (!q) return "";
  const cls = q.chg > 0 ? "up" : q.chg < 0 ? "down" : "flat";
  const sign = q.chg > 0 ? "+" : "";
  return `<div class="idx-card"><h4>${title}</h4>
    <div class="val ${cls}">${q.last.toLocaleString()}<small>${sign}${q.chg}%</small></div></div>`;
}

async function renderWatch() {
  let data = await fetchJSON("tw_stocks");
  if (data) stocksCache = data; else data = stocksCache;

  const idx = await fetchJSON("tw_index");
  document.getElementById("idx-cards").innerHTML = idx
    ? idxCard("еҠ ж¬ҠжҢҮж•ё", idx) + idxCard("ж«ғиІ·жҢҮж•ё", idx.otc) : "";

  const cards = document.getElementById("cards");
  if (!data) {
    document.getElementById("meta").textContent = "е°ҡз„ЎеҖӢиӮЎиіҮж–ҷпјҲи«Ӣе…Ҳе•ҹеӢ•зӣӨдёӯ runnerпјү";
    cards.innerHTML = "";
    return;
  }
  const live = isFresh(data) ? "гҖҖрҹ”ҙ еҚіжҷӮ" : "пјҲе·Іж”¶зӣӨ/иіҮж–ҷйқһеҚіжҷӮпјү";
  document.getElementById("meta").textContent = `иҮӘйҒёиӮЎзӣЈжҺ§пҪң${data.dataDate}${live}`;

  cards.innerHTML = getWL().map(code => {
    const s = data.stocks[code];
    if (!s) return `<div class="card"><button class="rm" data-code="${code}">вң•</button>
      <h3>${code}</h3><div class="ohlc">жҹҘз„ЎиіҮж–ҷпјҲеғ…ж”ҜжҸҙдёҠеёӮжҷ®йҖҡиӮЎпјү</div></div>`;
    const cls = s.chg > 0 ? "up" : s.chg < 0 ? "down" : "flat";
    const sign = s.chg > 0 ? "+" : "";
    const color = s.chg > 0 ? "#f85149" : s.chg < 0 ? "#3fb950" : "#8b949e";
    return `<div class="card" data-detail="${code}">
      <button class="rm" data-code="${code}">вң•</button>
      <h3>${s.n}<small>${code}</small></h3>
      <div class="price ${cls}">${s.z}<small>${sign}${s.chg}%</small></div>
      <div class="ohlc">
        <span>й–Ӣ <b>${s.o ?? "-"}</b></span><span>й«ҳ <b>${s.h ?? "-"}</b></span>
        <span>дҪҺ <b>${s.l ?? "-"}</b></span><span>жҳЁж”¶ <b>${s.y}</b></span>
      </div>
      <div class="ohlc">
        <span>жҲҗдәӨйҮҸ <b>${s.v.toLocaleString()} ејө</b></span>
        <span>йҮ‘йЎҚ <b>${s.a} е„„</b></span>
      </div>
      ${sparkSVG(s.spark, s.y, color)}</div>`;
  }).join("");

  cards.querySelectorAll(".rm").forEach(b => b.addEventListener("click", e => {
    e.stopPropagation();
    setWL(getWL().filter(c => c !== b.dataset.code));
    renderWatch();
  }));
  cards.querySelectorAll("[data-detail]").forEach(el =>
    el.addEventListener("click", () => openDetail(el.dataset.detail)));
}

// ---------- еҖӢиӮЎи©ізҙ°й Ғ ----------
let detailChart = null, detailTimer = null, detailCode = null;

async function openDetail(code) {
  detailCode = code;
  document.getElementById("detail").style.display = "block";
  if (!detailChart) {
    detailChart = echarts.init(document.getElementById("detail-chart"));
  }
  await renderDetail();
  clearInterval(detailTimer);
  detailTimer = setInterval(renderDetail, 60 * 1000);
}

function closeDetail() {
  document.getElementById("detail").style.display = "none";
  clearInterval(detailTimer);
  detailTimer = null;
  detailCode = null;
}
document.getElementById("dt-close").addEventListener("click", closeDetail);
document.getElementById("detail").addEventListener("click",
  e => { if (e.target.id === "detail") closeDetail(); });

async function renderDetail() {
  if (!detailCode) return;
  const code = detailCode;
  const s = stocksCache?.stocks[code];
  if (!s) return;
  const series = await fetchJSON("tw_series");

  const cls = s.chg > 0 ? "up" : s.chg < 0 ? "down" : "flat";
  const sign = s.chg > 0 ? "+" : "";
  const color = s.chg > 0 ? "#f85149" : s.chg < 0 ? "#3fb950" : "#8b949e";
  document.getElementById("dt-name").textContent = `${s.n} ${code}`;
  const priceEl = document.getElementById("dt-price");
  priceEl.className = `price ${cls}`;
  priceEl.innerHTML = `${s.z}<small>${sign}${s.chg}%</small>`;

  // иө°еӢўең–пјҡеғ№ж јз·ҡ + еқҮеғ№з·ҡ + йҮҸиғҪ
  const ser = series?.stocks[code];
  if (ser) {
    const times = series.times;
    const prices = ser.p;
    const vols = ser.v.map((v, i) =>
      v == null ? 0 : Math.max(0, v - (i > 0 ? (ser.v[i - 1] ?? v) : 0)));
    if (ser.v[0] != null) vols[0] = 0;  // з¬¬дёҖзӯҶжҳҜзҙҜиЁҲеҖјйқһе–®йҮҸ
    let cumA = 0, cumV = 0;
    const avg = prices.map((p, i) => {
      if (p != null && vols[i] > 0) { cumA += p * vols[i]; cumV += vols[i]; }
      return cumV > 0 ? +(cumA / cumV).toFixed(2) : p;
    });
    const lo = Math.min(...prices.filter(p => p != null), s.y);
    const hi = Math.max(...prices.filter(p => p != null), s.y);
    const pad = Math.max((hi - lo) * 0.12, s.y * 0.002);
    detailChart.setOption({
      backgroundColor: "transparent",
      grid: [{ left: 56, right: 16, top: 12, height: 180 },
             { left: 56, right: 16, top: 210, height: 64 }],
      xAxis: [
        { type: "category", data: times, gridIndex: 0, show: false },
        { type: "category", data: times, gridIndex: 1,
          axisLine: { lineStyle: { color: "#484f58" } },
          axisLabel: { color: "#8b949e" } },
      ],
      yAxis: [
        { type: "value", gridIndex: 0, min: +(lo - pad).toFixed(2), max: +(hi + pad).toFixed(2),
          splitLine: { lineStyle: { color: "#21262d" } },
          axisLabel: { color: "#8b949e" } },
        { type: "value", gridIndex: 1, splitLine: { show: false },
          axisLabel: { color: "#8b949e", formatter: v => v >= 1000 ? (v / 1000) + "k" : v } },
      ],
      axisPointer: { link: [{ xAxisIndex: "all" }] },
      tooltip: {
        trigger: "axis",
        backgroundColor: "#161b22", borderColor: "#30363d",
        textStyle: { color: "#e6edf3", fontSize: 12 },
        formatter: ps => {
          const i = ps[0].dataIndex;
          return `${times[i]}<br>жҲҗдәӨ ${prices[i] ?? "-"}гҖҖеқҮеғ№ ${avg[i] ?? "-"}<br>е–®йҮҸ ${vols[i]} ејө`;
        },
      },
      series: [
        { type: "line", data: prices, xAxisIndex: 0, yAxisIndex: 0,
          symbol: "none", lineStyle: { color, width: 1.5 }, connectNulls: true,
          markLine: { silent: true, symbol: "none",
            lineStyle: { color: "#6e7681", type: "dashed" },
            label: { color: "#8b949e", formatter: "жҳЁж”¶ {c}" },
            data: [{ yAxis: s.y }] } },
        { type: "line", data: avg, xAxisIndex: 0, yAxisIndex: 0,
          symbol: "none", lineStyle: { color: "#d2a8ff", width: 1 }, connectNulls: true },
        { type: "bar", data: vols, xAxisIndex: 1, yAxisIndex: 1,
          itemStyle: { color: "#58a6ff", opacity: 0.7 } },
      ],
    }, true);
  }

  // еҹәжң¬иіҮж–ҷ
  const f = v => v ?? "-";
  document.getElementById("dt-info").innerHTML = `
    <span>жјІеҒң</span><b class="up">${f(s.u)}</b>
    <span>и·ҢеҒң</span><b class="down">${f(s.w)}</b>
    <span>й–ӢзӣӨ</span><b>${f(s.o)}</b>
    <span>жҳЁж”¶</span><b>${s.y}</b>
    <span>жңҖй«ҳ</span><b>${f(s.h)}</b>
    <span>жңҖдҪҺ</span><b>${f(s.l)}</b>
    <span>жҲҗдәӨйҮҸ</span><b>${s.v.toLocaleString()} ејө</b>
    <span>жҲҗдәӨйҮ‘йЎҚ</span><b>${s.a} е„„</b>`;

  // дә”жӘ”
  const maxVol = Math.max(...(s.bids || []).map(b => b[1]),
                          ...(s.asks || []).map(a => a[1]), 1);
  const rows = [];
  for (let i = 0; i < 5; i++) {
    const b = (s.bids || [])[i], a = (s.asks || [])[i];
    rows.push(`<tr>
      <td style="text-align:right">${b ? b[1].toLocaleString() : "-"}</td>
      <td style="text-align:right;color:#f85149">${b ? b[0] : "-"}
        ${b ? `<div class="bar" style="right:0;width:${(b[1] / maxVol * 96).toFixed(0)}%;background:#f85149"></div>` : ""}</td>
      <td style="color:#3fb950">${a ? a[0] : "-"}
        ${a ? `<div class="bar" style="left:0;width:${(a[1] / maxVol * 96).toFixed(0)}%;background:#3fb950"></div>` : ""}</td>
      <td>${a ? a[1].toLocaleString() : "-"}</td></tr>`);
  }
  document.getElementById("dt-ob").innerHTML =
    `<tr><th style="text-align:right;color:#8b949e;font-weight:normal">е§”иІ·йҮҸ</th>
     <th style="text-align:right;color:#8b949e;font-weight:normal">иІ·еғ№</th>
     <th style="color:#8b949e;font-weight:normal">иіЈеғ№</th>
     <th style="color:#8b949e;font-weight:normal">е§”иіЈйҮҸ</th></tr>` + rows.join("");

  // еҲҶжҷӮжҳҺзҙ°пјҲжңҖиҝ‘ 20 зӯҶеҸ–жЁЈпјү
  if (ser) {
    const times = series.times;
    const tickRows = [];
    for (let i = times.length - 1; i >= 0 && tickRows.length < 20; i--) {
      const p = ser.p[i];
      if (p == null) continue;
      const dv = i > 0 ? Math.max(0, (ser.v[i] ?? 0) - (ser.v[i - 1] ?? 0)) : 0;
      const c = p > s.y ? "up" : p < s.y ? "down" : "flat";
      tickRows.push(`<tr><td>${times[i]}</td>
        <td class="${c}">${p}</td><td>${dv.toLocaleString()}</td></tr>`);
    }
    document.getElementById("dt-ticks").innerHTML =
      `<tr><th>жҷӮй–“</th><th>жҲҗдәӨеғ№</th><th>е–®йҮҸ(ејө)</th></tr>` + tickRows.join("");
  }
}

// д»ЈиҷҹжҲ–еҗҚзЁұ вҶ’ [code, name] еҖҷйҒёжё…е–®пјҲд»ЈиҷҹеүҚз¶ҙжҲ–еҗҚзЁұеҢ…еҗ«пјү
function matchStocks(q) {
  if (!q || !stocksCache) return [];
  const out = [];
  for (const [code, s] of Object.entries(stocksCache.stocks)) {
    if (code.startsWith(q) || s.n.includes(q)) {
      out.push([code, s.n]);
      if (out.length >= 8) break;
    }
  }
  return out;
}

function addCode(code) {
  const wl = getWL();
  if (!wl.includes(code)) { wl.push(code); setWL(wl); }
  const input = document.getElementById("watch-input");
  input.value = "";
  hideSuggest();
  renderWatch();
}

function addWatch() {
  const q = document.getElementById("watch-input").value.trim();
  if (!q) return;
  // зҙ” 4 зўјд»ЈиҷҹзӣҙжҺҘж”¶пјӣе…¶йӨҳз”ЁеҗҚзЁұ/еүҚз¶ҙи§ЈжһҗпјҢеҸ–з¬¬дёҖеҖӢеҖҷйҒё
  if (/^\d{4}$/.test(q)) return addCode(q);
  const m = matchStocks(q);
  const exact = m.find(([, n]) => n === q);
  if (exact || m.length) addCode((exact || m[0])[0]);
}

const suggestEl = document.getElementById("suggest");
function hideSuggest() { suggestEl.style.display = "none"; }

function showSuggest() {
  const q = document.getElementById("watch-input").value.trim();
  const m = matchStocks(q);
  if (!m.length) return hideSuggest();
  suggestEl.innerHTML = m.map(([code, n]) =>
    `<div data-code="${code}">${n}<small>${code}</small></div>`).join("");
  suggestEl.style.display = "block";
  suggestEl.querySelectorAll("div").forEach(el =>
    el.addEventListener("mousedown", e => { e.preventDefault(); addCode(el.dataset.code); }));
}

document.getElementById("watch-add").addEventListener("click", addWatch);
document.getElementById("watch-input").addEventListener("input", showSuggest);
document.getElementById("watch-input").addEventListener("blur", () => setTimeout(hideSuggest, 150));
document.getElementById("watch-input").addEventListener("keydown", e => {
  if (e.key === "Enter") addWatch();
  if (e.key === "Escape") hideSuggest();
});

document.querySelectorAll(".tab").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    load(btn.dataset.market);
  });
});
window.addEventListener("resize", () => chart.resize());
load("tw");
</script>
