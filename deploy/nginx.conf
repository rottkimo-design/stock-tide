server {
    listen 80;
    server_name your-domain.com;  # 改成你的網域或 IP

    root /home/ubuntu/stock-tide/public;
    index index.html;

    # 靜態資料無快取（前端靠 generatedAt 判斷新鮮度）
    location /data/ {
        add_header Cache-Control "no-cache, must-revalidate";
        add_header Access-Control-Allow-Origin "*";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
